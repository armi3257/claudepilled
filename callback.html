<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClaudePilled - Authorization Complete</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0D0D0D;
            color: #E0E0E0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: #111;
            border: 1px solid #00FF8844;
            border-radius: 16px;
            padding: 48px;
            text-align: center;
            max-width: 480px;
        }
        h1 { color: #00FF88; font-size: 28px; margin-bottom: 12px; }
        p { color: #aaa; font-size: 15px; line-height: 1.6; margin-bottom: 16px; }
        .code-box {
            background: #0a0a14;
            border: 1px solid #222;
            border-radius: 8px;
            padding: 16px;
            font-family: 'SF Mono', 'Fira Code', monospace;
            font-size: 14px;
            color: #00D4FF;
            word-break: break-all;
            margin: 16px 0;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>&#10003; Authorization Complete</h1>
        <p>TikTok account connected successfully.</p>
        <div class="code-box" id="authCode">Retrieving authorization code...</div>
        <p>You can close this window. The agent will handle the rest.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const el = document.getElementById('authCode');
        if (code) {
            el.textContent = 'Auth code: ' + code;
        } else {
            el.textContent = 'Waiting for redirect...';
        }
    </script>
</body>
</html>
